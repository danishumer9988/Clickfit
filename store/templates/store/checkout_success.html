{% extends 'store/base.html' %}

{% block content %}
<style>
    body {
        font-family: 'Poppins', sans-serif;
        background-color: #111;
        color: #fff;
    }

    .success-container {
        max-width: 600px;
        margin: 100px auto;
        background: #222;
        padding: 40px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        animation: fadeIn 0.6s ease-in-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .success-container h1 {
        color: #4BB543;
        font-size: 36px;
        margin-bottom: 15px;
    }

    .success-container p {
        color: #ccc;
        font-size: 16px;
        margin-bottom: 25px;
    }

    .btn-container {
        margin-top: 30px;
    }

    .btn-container a {
        background: #8e2de2;
        color: white;
        padding: 12px 30px;
        text-decoration: none;
        border-radius: 30px;
        font-weight: bold;
        transition: background 0.3s, transform 0.3s;
        display: inline-block;
    }

    .btn-container a:hover {
        background: #7b1fa2;
        transform: translateY(-2px);
    }
</style>

<div class="success-container">
    <h1>Order Placed Successfully!</h1>
    <p>Thank you for shopping with us.</p>
    <p>Your order ID is <strong>#{{ order.id }}</strong>.</p>

    <div class="btn-container">
        <a href="{% url 'product_list' %}">Continue Shopping</a>
        <a href="{% url 'receipt' order.id %}" style="margin-left: 15px;">View Receipt</a>
    </div>
</div>

{% endblock %}
