{% extends 'store/base.html' %}

{% block content %}
<style>
    body {
        background-color: #111;
        font-family: 'Poppins', sans-serif;
        color: #fff;
    }

    .notif-container {
        max-width: 600px;
        margin: 80px auto;
        padding: 30px;
        background: #222;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .notif {
        background: #333;
        padding: 15px 20px;
        margin-bottom: 12px;
        border-radius: 10px;
        box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        transition: background 0.3s, transform 0.2s;
        position: relative;
    }

    .notif:hover {
        background: #444;
        transform: translateY(-3px);
    }

    .notif.read {
        opacity: 0.6;
    }

    .notif .time {
        position: absolute;
        top: 15px;
        right: 20px;
        font-size: 12px;
        color: #999;
    }

    .notif .new-badge {
        background: #e60023;
        color: #fff;
        padding: 4px 10px;
        border-radius: 30px;
        font-size: 12px;
        margin-right: 10px;
    }
</style>

<div class="notif-container">
    <h2 style="text-align:center; margin-bottom: 20px; color:#8e2de2;">Notifications</h2>

    {% for note in notifications %}
        <div class="notif {% if note.is_read %}read{% endif %}">
            {% if not note.is_read %}
                <span class="new-badge">New</span>
            {% endif %}
            {{ note.message }}
            <span class="time">{{ note.created_at|date:"d M Y H:i" }}</span>
        </div>
    {% empty %}
        <p style="text-align:center; color:#ccc;">No notifications yet.</p>
    {% endfor %}
</div>

{% endblock %}
