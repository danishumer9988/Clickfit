{% extends 'store/base.html' %}

{% block title %}Contact - Clickfit{% endblock %}

{% block nav-color %}
navbar-colored
{% endblock %}

{% block content %}
<style>
    body {
        background-color: #111;
        padding: 0;
    }

    h1 {
        color: #8e2de2;
        text-align: center;
        margin-top: 80px;
        margin-bottom: 40px;
        font-size: 36px;
    }

    form {
        max-width: 600px;
        margin: auto;
        padding: 50px;
        background-color: #222;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        border-radius: 15px;
        color: #fff;
    }

    input[type="text"], input[type="email"], textarea {
        width: 100%;
        padding: 15px;
        margin-bottom: 20px;
        border: none;
        border-radius: 8px;
        background: #333;
        color: #fff;
        font-size: 15px;
    }

    input::placeholder, textarea::placeholder {
        color: #aaa;
    }

    textarea {
        resize: vertical;
    }

    button {
        padding: 12px 25px;
        background-color: #8e2de2;
        border: none;
        border-radius: 30px;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
        width: 100%;
    }

    button:hover {
        background-color: #7b1fa2;
    }

    .messages {
        max-width: 600px;
        margin: 20px auto;
        font-size: 16px;
    }

    .messages p {
        background-color: #d4edda;
        color: #155724;
        padding: 10px 15px;
        border-radius: 5px;
    }

    @media (max-width: 768px) {
        h1 {
            font-size: 28px;
            margin-top: 50px;
        }

        form {
            padding: 20px;
        }
    }
</style>

<h1>Contact Us</h1>

<!-- Messages -->
{% if messages %}
    <div class="messages">
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    </div>
{% endif %}

<!-- Contact Form -->
<form method="post">
    {% csrf_token %}
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
    <button type="submit">Send Message</button>
</form>

{% endblock %}
