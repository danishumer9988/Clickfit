{% extends 'store/base.html' %}
{% block content %}
<style>
    .update-container {
        max-width: 500px;
        margin: 60px auto;
        background: #0d0d0d;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 0 25px rgba(142,45,226,0.4);
        color: white;
        font-family: 'Poppins', sans-serif;
    }

    .update-container h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #8e2de2;
        text-shadow: 0 0 8px rgba(142,45,226,0.5);
    }

    .update-container input[type="text"],
    .update-container input[type="email"],
    .update-container input[type="file"] {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border-radius: 10px;
        background: #222;
        color: white;
        border: none;
    }

    .update-container button {
        width: 100%;
        padding: 12px;
        background: #8e2de2;
        border: none;
        border-radius: 10px;
        font-weight: bold;
        color: white;
        box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        cursor: pointer;
        transition: background 0.3s;
    }

    .update-container button:hover {
        background: #7b1fa2;
    }
</style>

<div class="update-container">
    <h2>Update Profile</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="text" name="username" value="{{ user.username }}" required>
        <input type="email" name="email" value="{{ user.email }}" required>
        <input type="file" name="profile_picture">
        <button type="submit">Save Changes</button>
    </form>
</div>
{% endblock %}
