{% extends 'store/base.html' %}
{% block content %}
    <style>
        body {
            background: #0d0d0d;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
        }

        .form-container {
            max-width: 400px;
            margin: 80px auto;
            padding: 35px;
            background: #0d0d0d;
            box-shadow: 0 0 25px rgba(142,45,226,0.4);
            border-radius: 15px;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #8e2de2;
            text-shadow: 0 0 8px rgba(142,45,226,0.5);
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
            border-radius: 10px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #8e2de2;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 15px rgba(142,45,226,0.5);
            transition: background 0.3s;
            cursor: pointer;
        }

        button:hover {
            background: #7b1fa2;
        }

        .messages {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #ff4d4d;
            box-shadow: 0 0 10px rgba(255,77,77,0.3);
        }
    </style>

<div class="form-container">
    <h2>Verify OTP</h2>

    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <input type="text" name="otp" placeholder="Enter OTP" required>
        <button type="submit">Verify</button>
    </form>
</div>

{% endblock %}
