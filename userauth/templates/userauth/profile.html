{% extends 'store/base.html' %}
{% block content %}
<style>
    .profile-container {
        max-width: 500px;
        margin: 60px auto;
        background: #0d0d0d;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 0 25px rgba(142,45,226,0.4);
        color: white;
        font-family: 'Poppins', sans-serif;
    }

    .profile-container h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #8e2de2;
        text-shadow: 0 0 8px rgba(142,45,226,0.5);
    }

    .profile-container p {
        margin: 10px 0;
        font-size: 16px;
    }

    .profile-picture {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        display: block;
        margin: 20px auto;
        box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }

    .profile-buttons {
        margin-top: 25px;
        display: flex;
        justify-content: center;
        gap: 15px;
    }

    .profile-buttons a {
        padding: 12px 20px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
        box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }

    .update-btn {
        background: #8e2de2;
        color: white;
    }

    .update-btn:hover {
        background: #7b1fa2;
    }

    .logout-btn {
        background: #ff4d4d;
        color: white;
    }

    .logout-btn:hover {
        background: #d73838;
    }
</style>

<div class="profile-container">
    <h2>Your Profile</h2>

    <p><strong>Username:</strong> {{ user.username }}</p>
    <p><strong>Email:</strong> {{ user.email }}</p>

    <img src="{{ user.profile.profile_picture.url }}" alt="Profile Picture" class="profile-picture">

    <div class="profile-buttons">
        <a href="{% url 'update_profile' %}" class="update-btn">Update Profile</a>
        <a href="{% url 'logout' %}" class="logout-btn">Logout</a>
    </div>
</div>
{% endblock %}
